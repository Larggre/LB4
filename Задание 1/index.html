<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 задание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 1000px;
            max-width: 100%;
            border: 2px solid black;
            padding: 10px;
            background: white;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        img {
            height: 200px;
            margin: 10px;
            display: block;
        }

        .info {
            flex: 1;
            min-width: 180px;
        }

        .title {
            font-size: large;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .upload-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 12px;
        }


        .upload {
            border: 1px solid blue;
            padding-left: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: white;
        }

        .left {
            margin-right: 0;    
            padding: 5px;
            padding-right: 150px;
            background-color: aqua;
            white-space: nowrap;   
        }

        .right {
            white-space: nowrap;
            padding: 5px;
            margin-left: 10px;
            color: #333;
        }

        .button {
            background-color: darkblue;
            text-align: center;
            color: white;
            padding: 5px;
            width: 90px;
        }


        .text {
            color: gray;
            margin-top: 6px;
        }
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            img {
                margin: 10px auto;
            }

            .info {
                text-align: left;
            }

            .upload-row {
                flex-direction: column;
                align-items: stretch;
            }

            .upload {
                justify-content: space-between;
                width: 100%;
            }

            .button {
                width: 100%;
                text-align: center;
            }

            .title, .text {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images.png" alt="">
        <div class="info">

            <div class="upload-row">
                <div class="upload">
                    <span class="left">UPLOADING 40%</span>
                    <span class="right">About 23 minutes remainning</span>
                </div>
                <div class="button">DONE</div>
            </div>
            <div class="title">Title of video</div>
            <div class="text">*Your video is still uploading</div>
        </div>
    </div>
</body>
</html>
